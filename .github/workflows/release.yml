name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Linux amd64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -a -ldflags '-extldflags "-static" -s -w -X main.gVersion=${{ steps.version.outputs.VERSION }}' \
            -o infocli-${{ steps.version.outputs.VERSION }}-linux-amd64 .

      - name: Build macOS amd64
        env:
          CGO_ENABLED: '0'
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -a -ldflags '-s -w -X main.gVersion=${{ steps.version.outputs.VERSION }}' \
            -o infocli-${{ steps.version.outputs.VERSION }}-darwin-amd64 .

      - name: Build macOS arm64
        env:
          CGO_ENABLED: '0'
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -a -ldflags '-s -w -X main.gVersion=${{ steps.version.outputs.VERSION }}' \
            -o infocli-${{ steps.version.outputs.VERSION }}-darwin-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            infocli-${{ steps.version.outputs.VERSION }}-linux-amd64
            infocli-${{ steps.version.outputs.VERSION }}-darwin-amd64
            infocli-${{ steps.version.outputs.VERSION }}-darwin-arm64
